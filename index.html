<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Hailey 💖</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #ffeef5, #fff6fb);
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      bottom: -40px;
      color: rgba(255, 77, 136, 0.45);
      animation: floatUp linear infinite;
      font-size: 18px;
    }

    .heart:nth-child(1)  { left: 6%;  animation-duration: 10s; animation-delay: 0s; font-size: 22px; }
    .heart:nth-child(2)  { left: 14%; animation-duration: 13s; animation-delay: 2s; }
    .heart:nth-child(3)  { left: 23%; animation-duration: 11s; animation-delay: 1s; font-size: 26px; }
    .heart:nth-child(4)  { left: 32%; animation-duration: 14s; animation-delay: 4s; }
    .heart:nth-child(5)  { left: 41%; animation-duration: 12s; animation-delay: 3s; font-size: 20px; }
    .heart:nth-child(6)  { left: 52%; animation-duration: 15s; animation-delay: 5s; font-size: 28px; }
    .heart:nth-child(7)  { left: 63%; animation-duration: 10s; animation-delay: 1.5s; }
    .heart:nth-child(8)  { left: 74%; animation-duration: 13s; animation-delay: 2.5s; font-size: 24px; }
    .heart:nth-child(9)  { left: 84%; animation-duration: 11s; animation-delay: 0.5s; }
    .heart:nth-child(10) { left: 92%; animation-duration: 14s; animation-delay: 3.5s; font-size: 21px; }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1) rotate(0deg);
        opacity: 0;
      }
      10% { opacity: 1; }
      100% {
        transform: translateY(-115vh) scale(1.25) rotate(18deg);
        opacity: 0;
      }
    }

    .card {
      position: relative;
      width: min(92vw, 760px);
      padding: 28px;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 50px rgba(214, 93, 133, 0.22);
      border: 2px solid rgba(255, 170, 200, 0.45);
      text-align: center;
      z-index: 2;
      animation: popIn 1s ease;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.92) translateY(18px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .photo-wrap {
      width: 210px;
      height: 210px;
      margin: 0 auto 22px;
      border-radius: 50%;
      padding: 8px;
      background: linear-gradient(135deg, #ff8fb8, #ffbdd4, #ffd9e8);
      box-shadow: 0 10px 24px rgba(255, 105, 150, 0.26);
      animation: glow 2.8s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { transform: scale(1); box-shadow: 0 10px 24px rgba(255, 105, 150, 0.22); }
      to   { transform: scale(1.03); box-shadow: 0 15px 34px rgba(255, 105, 150, 0.35); }
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      background: #fff;
    }

    h1 {
      margin: 6px 0 10px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      color: #d94d86;
    }

    .message {
      margin: 0 auto;
      max-width: 620px;
      font-size: clamp(1.15rem, 2.1vw, 1.55rem);
      line-height: 1.7;
      color: #6f3450;
      font-weight: 600;
    }

    .sparkle {
      display: inline-block;
      animation: pulse 1.7s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    .subtext {
      margin-top: 18px;
      color: #b05d80;
      font-size: 0.98rem;
      letter-spacing: 0.03em;
    }

    .btn {
      margin-top: 24px;
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #ff6ea8, #ff8fc0);
      box-shadow: 0 10px 22px rgba(255, 110, 168, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 14px 28px rgba(255, 110, 168, 0.35);
    }

    .hidden-note {
      margin-top: 18px;
      font-size: 1.02rem;
      color: #8e4565;
      display: none;
      font-weight: 600;
    }

    @media (max-width: 560px) {
      .card { padding: 22px 18px; border-radius: 24px; }
      .photo-wrap { width: 170px; height: 170px; }
      .message { line-height: 1.55; }
    }
  </style>
</head>
<body>
  <div class="hearts" aria-hidden="true">
    <div class="heart">❤</div>
    <div class="heart">❤</div>
    <div class="heart">❤</div>
    <div class="heart">❤</div>
    <div class="heart">❤</div>
    <div class="heart">❤</div>
    <div class="heart">❤</div>
    <div class="heart">❤</div>
    <div class="heart">❤</div>
    <div class="heart">❤</div>
  </div>

  <main class="card">
    <div class="photo-wrap">
      <img src="hailey.jpeg" alt="Cute romantic flowers and heart-themed image" />
    </div>

    <h1><span class="sparkle">💖</span> For Hailey <span class="sparkle">💖</span></h1>

    <p class="message">
      I love you so much Hailey, you are the greatest gift for me.
    </p>

    <p class="subtext">Every click, every moment, all my love goes to you ✨</p>

    <button class="btn" onclick="showNote()">Click for an extra little love note</button>
    <div class="hidden-note" id="loveNote">You make my world softer, brighter, and more beautiful every single day. 💗</div>
  </main>

  <script>
    function showNote() {
      const note = document.getElementById('loveNote');
      note.style.display = 'block';
    }
  </script>
</body>
</html>
